<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="swamp.lost — An interactive, browser-based narrative game exploring themes of trust, verification, and digital identity.">
  <title>swamp.lost</title>
  
  <!-- CSS Design System Stylesheets -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Grain Overlay using inline SVG noise filter -->
  <svg style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; opacity: var(--grain-opacity); z-index: 9999;">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch" />
    </filter>
    <rect width="100%" height="100%" filter="url(#noise)" />
  </svg>

  <!-- Central SPA App Target -->
  <div id="app"></div>

  <!-- App Bootstrap Module -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
